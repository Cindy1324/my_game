    function saveEnding(ending) {
      if (!unlocked.find(e => e.code === ending.code)) {
        unlocked.push(ending);
        localStorage.setItem(SAVE_KEY, JSON.stringify(unlocked));
      }
    }

    function saveProgress() {
      progress.cur = cur;
      progress.flags = flags;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    }

    function manualSave() {
      const data = {
        cur,
        unlocked,
        flags
      };
      localStorage.setItem(MANUAL_SAVE_KEY, JSON.stringify(data));
      alert("已保存进度");
    }

    function manualLoad() {
      const data = JSON.parse(localStorage.getItem(MANUAL_SAVE_KEY) || "null");
      if (!data) {
        alert("没有手动存档");
        return;
      }
      cur = data.cur || "start";
      unlocked = data.unlocked || [];
      if (data.flags) {
        flags.trustPink = data.flags.trustPink || 0;
        flags.trustOrange = data.flags.trustOrange || 0;
        flags.trustHuang = data.flags.trustHuang || 0;
      }
      localStorage.setItem(SAVE_KEY, JSON.stringify(unlocked));
      saveProgress();
      render();
    }

    function clearManualSave() {
      localStorage.removeItem(MANUAL_SAVE_KEY);
      localStorage.removeItem(PROGRESS_KEY);
      cur = "start";
      flags.trustPink = 0;
      flags.trustOrange = 0;
      flags.trustHuang = 0;
      saveProgress();
      alert("已清除当前进度存档");
      render();
    }

    function renderUnlock() {
      const unlock = document.getElementById("unlock");
      unlock.innerHTML = "";
      unlocked.forEach(e => {
        const item = document.createElement("div");
        item.className = "small";
        item.innerText = `[${e.code}] ${e.cn} / ${e.en}`;
        unlock.appendChild(item);
      });
    }

    function getEndingExtra(s) {
  let extra = "";

  if (s.ending.code === "E12") {
    extra += `\n\n（这一次，你动了。）`;
  }

  if (s.ending.code === "E04" && flags.trustPink > 0) {
    extra += `\n\n你忽然想起她之前看你的那一眼。`;
  }

  return extra;
}

    function render() {
      const s = story[cur];
      const text = document.getElementById("text");
      const choices = document.getElementById("choices");
      const endingArea = document.getElementById("endingArea");

      let displayText = s.text;

if (glitchLevel >= 2) {
  displayText += "\n\n⚠ 记录校验异常";
}

if (glitchLevel >= 4) {
  displayText += "\n\n⚠ 检测到重复操作";
}

if (glitchLevel >= 6) {
  displayText += "\n\n⚠ 当前节点存在未授权偏移";
}

if (s.ending) {
  displayText += getEndingExtra(s);
}

if (cur === "pink_check" && pinkLoopCount >= 2) {
  displayText += "\n\n她这次看你的时间更久了。";
}

if (cur === "pink_check" && pinkLoopCount >= 3) {
  displayText += "\n\n“……你不是第一次听到这句话了，对吧？”";
}

if (cur === "talk_pink" && pinkLoopCount >= 2) {
  displayText += "\n\n她像是早就知道你会来找她。";
}

if (cur === "talk_pink" && pinkLoopCount >= 3) {
  displayText += "\n\n“这次，你终于愿意认真听了？”";
}
     if (cur === "orange_probe" && orangeLoopCount >= 2) {
  displayText += "\n\n他这次看你的眼神，比刚才更像是在确认什么。";
}

if (cur === "orange_probe" && orangeLoopCount >= 3) {
  displayText += "\n\n“你终于开始问这个了。”";
}

if (cur === "orange_probe" && orangeLoopCount >= 5) {
  displayText += "\n\n“这句开场，你上次反应得更慢。”";
}

if (cur === "orange_hint" && orangeLoopCount >= 2) {
  displayText += "\n\n“你上一次没有听到这里。”";
}

if (cur === "orange_hint" && orangeLoopCount >= 3) {
  displayText += "\n\n“别紧张，我只是比你更早接受了重复。”";
}

if (cur === "orange_hint" && orangeLoopCount >= 5) {
  displayText += "\n\n“你是不是认为我是从这一次才开始记得的？”";
}

if (cur === "orange_deep" && orangeLoopCount >= 2) {
  displayText += "\n\n他停顿了一下，像是在翻找某一轮留下来的记录。";
}

if (cur === "orange_deep" && orangeLoopCount >= 4) {
  displayText += "\n\n“你认为我是第一次带你走这条路吗？”";
}

if (cur === "orange_deep" && orangeLoopCount >= 6) {

}

    .replaceAll("他们", "你们")

}
      text.innerText = displayText;
      choices.innerHTML = "";
      endingArea.innerHTML = "";

        const box = document.createElement("div");
        box.className = "ending-box";
        box.innerHTML = `
          <div>【${s.ending.code}】${s.ending.cn}</div>
          <div class="ending-en">${s.ending.en}</div>
        `;
        endingArea.appendChild(box);

        const restart = document.createElement("button");
        restart.innerText = "重新开始";
        restart.onclick = () => {
          cur = "start";
          saveProgress();
          render();
        };
        endingArea.appendChild(restart);

        renderUnlock();
        return;
      }

      if (s.choices) {
  s.choices.forEach(x => {
    const b = document.createElement("button");

    const glitchNodes = ["start_after_loop", "loop_start"];

if (glitchLevel >= 6 && glitchNodes.includes(cur)) {
  b.innerText = "……";
} 
} else {
  b.innerText = x.label;
}

    b.onclick = () => {

        const text = document.getElementById("text");

      }

      if (cur === "start_after_loop") {
        glitchLevel++;
      }
      if (x.next === "pink_check" || x.next === "talk_pink") {

  localStorage.setItem("pink_loop", pinkLoopCount);
}

if (x.next === "orange_probe" || x.next === "orange_hint" || x.next === "orange_deep") {
  orangeLoopCount++;
  localStorage.setItem("orange_loop", orangeLoopCount);
}
if (x.next === "pink_check" || x.next === "talk_pink") {
  pinkLoopCount++;
}
      
      if (x.effect) x.effect();
      cur = x.next;
      saveProgress();
      render();
    };

    choices.appendChild(b);
  });
} else if (s.next) {
  const b = document.createElement("button");
  b.innerText = "继续";
  b.onclick = () => {
    cur = s.next;
    saveProgress();
    render();
  };
  choices.appendChild(b);
}
if (glitchLevel >= 8 && Math.random() < 0.12) {
  choices.innerHTML = "";
  const fake = document.createElement("button");
  fake.innerText = "……加载中";
  fake.disabled = true;
  choices.appendChild(fake);
}
      
      renderUnlock();
    }

    document.getElementById("saveBtn").onclick = manualSave;
    document.getElementById("loadBtn").onclick = manualLoad;
    document.getElementById("clearBtn").onclick = clearManualSave;

 document.body.ondblclick = () => {
  glitchLevel = 0;
  glitchTriggered = false;
  render();
};   
    render();
  </script>

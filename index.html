    function saveEnding(ending) {
      if (!unlocked.find(e => e.code === ending.code)) {
        unlocked.push(ending);
        localStorage.setItem(SAVE_KEY, JSON.stringify(unlocked));
      }
    }

    function saveProgress() {
      progress.cur = cur;
      progress.flags = flags;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    }

    function manualSave() {
      const data = {
        cur,
        unlocked,
        flags
      };
      localStorage.setItem(MANUAL_SAVE_KEY, JSON.stringify(data));
      alert("已保存进度");
    }

    function manualLoad() {
      const data = JSON.parse(localStorage.getItem(MANUAL_SAVE_KEY) || "null");
      if (!data) {
        alert("没有手动存档");
        return;
      }
      cur = data.cur || "start";
      unlocked = data.unlocked || [];
      if (data.flags) {
        flags.trustPink = data.flags.trustPink || 0;
        flags.trustOrange = data.flags.trustOrange || 0;
        flags.trustHuang = data.flags.trustHuang || 0;
      }
      localStorage.setItem(SAVE_KEY, JSON.stringify(unlocked));
      saveProgress();
      render();
    }

    function clearManualSave() {
      localStorage.removeItem(MANUAL_SAVE_KEY);
      localStorage.removeItem(PROGRESS_KEY);
      cur = "start";
      flags.trustPink = 0;
      flags.trustOrange = 0;
      flags.trustHuang = 0;
      saveProgress();
      alert("已清除当前进度存档");
      render();
    }

    function renderUnlock() {
      const unlock = document.getElementById("unlock");
      unlock.innerHTML = "";
      unlocked.forEach(e => {
        const item = document.createElement("div");
        item.className = "small";
        item.innerText = `[${e.code}] ${e.cn} / ${e.en}`;
        unlock.appendChild(item);
      });
    }

    function getEndingExtra(s) {
      let extra = "";

      if (s.ending.code === "E12") {
        if (flags.trustPink > 0) {
          extra += `\n\n粉没有再往前走。\n这一次，她只是站在你旁边。`;
        }
        if (flags.trustOrange > 0) {
          extra += `\n\n橙看了你一眼。\n这次他没再把话留一半。`;
        }
        if (flags.trustHuang > 0) {
          extra += `\n\n黄愣了一下。\n但他还是跟了上来。`;
        }
        extra += `\n\n（这一次，你动了。）`;
      }

      if (s.ending.code === "E04" && flags.trustPink > 0) {
        extra += `\n\n你忽然想起她之前看你的那一眼。`;
      }

      return extra;
    }

    function render() {
      const s = story[cur];
      const text = document.getElementById("text");
      const choices = document.getElementById("choices");
      const endingArea = document.getElementById("endingArea");

      let displayText = s.text;
      if (s.ending) {
        displayText += getEndingExtra(s);
      }

      text.innerText = displayText;
      choices.innerHTML = "";
      endingArea.innerHTML = "";

      saveProgress();

      if (s.ending) {
        saveEnding(s.ending);

        const box = document.createElement("div");
        box.className = "ending-box";
        box.innerHTML = `
          <div>【${s.ending.code}】${s.ending.cn}</div>
          <div class="ending-en">${s.ending.en}</div>
        `;
        endingArea.appendChild(box);

        const restart = document.createElement("button");
        restart.innerText = "重新开始";
        restart.onclick = () => {
          cur = "start";
          saveProgress();
          render();
        };
        endingArea.appendChild(restart);

        renderUnlock();
        return;
      }

      if (s.choices) {
        s.choices.forEach(x => {
          const b = document.createElement("button");
          b.innerText = x.label;
          b.onclick = () => {
            if (x.effect) x.effect();
            cur = x.next;
            saveProgress();
            render();
          };
          choices.appendChild(b);
        });
      } else if (s.next) {
        const b = document.createElement("button");
        b.innerText = "继续";
        b.onclick = () => {
          cur = s.next;
          saveProgress();
          render();
        };
        choices.appendChild(b);
      }

      renderUnlock();
    }

    document.getElementById("saveBtn").onclick = manualSave;
    document.getElementById("loadBtn").onclick = manualLoad;
    document.getElementById("clearBtn").onclick = clearManualSave;

    render();
  </script>
